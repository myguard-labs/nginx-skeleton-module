name: Security scanners

# Static analysis gate on every PR/push: flawfinder (blocking at >=4),
# clang-tidy (cert-*, security.*, blocking) and semgrep (advisory).
#
# Gating policy, and why it differs per tool:
#   flawfinder  -- blocks at severity >=4 only. It is a grep for risky APIs and
#                  is noisy below that; gating on every hit would train everyone
#                  to ignore it.
#   clang-tidy  -- blocks on cert-* and clang-analyzer-security.*. These are
#                  path-sensitive and near-zero-FP on code this size.
#   semgrep     -- ADVISORY (|| true). It is the highest-FP of the three; its
#                  value is the uploaded report a human reads, not a red X. If a
#                  semgrep rule earns its keep, promote it to blocking here
#                  deliberately -- do not leave it advisory forever by default.
#
# Action pins (keep in sync with build-test.yml):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.2"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: security-scanners-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scanners:
    name: Security scanners
    runs-on: ${{ github.event.pull_request.head.repo.fork && 'ubuntu-latest' || fromJSON('["self-hosted","builder02","lxc"]') }}
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flawfinder clang-tidy python3 python3-pip pipx curl \
            build-essential libpcre2-dev zlib1g-dev
          # semgrep via pipx: PEP 668 blocks a bare `pip3 install` into the
          # system Python on the Ubuntu 24.04 self-hosted runner.
          # PINNED: this executes downloaded code on a persistent self-hosted
          # runner, so pin the version for a reproducible, non-moving supply
          # chain (bump deliberately, same as the nginx pins). Unpinned = a
          # compromised/regressed release runs here silently on the next PR.
          SEMGREP_PIN="semgrep==1.169.0"
          if command -v pipx >/dev/null; then
            pipx install --quiet "$SEMGREP_PIN"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            pip3 install --quiet --user --break-system-packages "$SEMGREP_PIN"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      # clang-tidy needs ngx_auto_config.h, which only exists after configure.
      # Reuse ci-build.sh so this analyzes against the same pinned nginx the
      # build jobs use -- not a "latest mainline" that could drift apart from it.
      - name: Restore build caches
        uses: ./.github/actions/build-cache
        with:
          mode: module
          nginx-version: ${{ env.NGINX_VERSION }}

      - name: Generate nginx build headers (for clang-tidy)
        run: bash ci/tools/ci-build.sh nginx "$NGINX_VERSION" module

      - name: flawfinder (gate on >=4)
        run: |
          set -euo pipefail
          flawfinder --minlevel=1 "$GITHUB_WORKSPACE/src/" 2>&1 | tee flawfinder.log
          if flawfinder --minlevel=4 --quiet "$GITHUB_WORKSPACE/src/" 2>/dev/null \
               | grep -Eq 'Hits = [1-9]'; then
            echo "flawfinder: high-severity (>=4) findings present" >&2
            exit 1
          fi
          echo "flawfinder: clean at >=4"

      - name: clang-tidy (cert-*, security.*)
        run: |
          set -euo pipefail
          N="$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}-module"
          INCLUDES="-I$N/src/core -I$N/src/event -I$N/src/event/modules \
            -I$N/src/os/unix -I$N/objs -I$N/src/http -I$N/src/http/modules \
            -I$N/src/http/v2 -I$GITHUB_WORKSPACE/src -I/usr/include"
          status=0
          for src in "$GITHUB_WORKSPACE"/src/*.c; do
            echo "--- clang-tidy: $(basename "$src") ---"
            # DeprecatedOrUnsafeBufferHandling is disabled: it flags every
            # memcpy/sprintf in existence, including nginx's own idioms, and
            # would make the check unusable rather than safer.
            # shellcheck disable=SC2086
            clang-tidy "$src" \
              --checks='-*,cert-*,clang-analyzer-security.*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling' \
              --warnings-as-errors='*' \
              -- $INCLUDES 2>&1 | tee -a clang-tidy.log || status=1
          done
          exit "$status"

      - name: semgrep (advisory)
        run: |
          command -v semgrep >/dev/null || { echo "semgrep missing from PATH" >&2; exit 1; }
          semgrep scan --config p/c --config p/security-audit \
            "$GITHUB_WORKSPACE/src/" 2>&1 | tee semgrep.log || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
          retention-days: 14
