name: CodeQL

# CodeQL on the module TU only.
#
# The critical detail is the `module` build mode. For COMPILED languages CodeQL
# populates its database from whatever the traced build actually compiles -- the
# `paths` / `paths-ignore` filters are silently IGNORED. Tracing a full nginx
# build therefore pulls all of upstream nginx into the database and floods the
# Security tab with alerts against code we neither own nor patch. Scope is
# instead enforced by the build: ci-build.sh's `module` mode runs
# `make modules` only, so the nginx core is never compiled and never traced.
#
# Runs on ubuntu-latest, not the self-hosted runners: it needs no nginx binary,
# and the hosted image already ships the CodeQL bundle.
#
# Action pins:
# actions/checkout@v5      -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/cache@v4         -> 0057852bfaa89a56745cba8c7296529d2fc39830
# github/codeql-action@v4  -> 8aad20d150bbac5944a9f9d289da16a4b0d87c1e

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.2"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monthly, day 4 @ 04:47 UTC. Staggered away from ci-deep.yml (day 6) so the
    # two heavy scheduled runs never contend for the same runners.
    - cron: "47 4 4 * *"
  workflow_dispatch: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze C
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write   # required to upload the SARIF results
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev zlib1g-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: c-cpp
          queries: security-extended
          # Deliberately no paths/paths-ignore: they do nothing for C/C++ (see
          # the header comment). The `module` build below is what scopes this.

      - name: Restore build caches
        uses: ./.github/actions/build-cache
        with:
          mode: module
          nginx-version: ${{ env.NGINX_VERSION }}

      # NO_CACHE=1: CodeQL's tracer only sees a compile that actually invokes
      # the compiler. ccache serves a hit without running cc, so a warm cache
      # silently produces a database CodeQL can't populate -- "no source seen
      # during build" -- while the build itself looks fine. Tracing needs a
      # real compile every run; ccache and the CodeQL job are incompatible.
      - name: Build traced source (module only)
        run: NO_CACHE=1 bash ci/tools/ci-build.sh nginx "$NGINX_VERSION" module

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:c-cpp
