name: Build cache
description: >-
  Restore the ccache + nginx source/build caches for one build mode. Hybrid by
  design: on a PERSISTENT self-hosted runner the on-disk dirs are already warm
  and this is nearly a no-op; on an ephemeral or hosted runner actions/cache
  repopulates them. Keep both paths -- see the "Why hybrid" note below.

inputs:
  mode:
    description: "Build mode: debug | asan | module. MUST match the ci-build.sh arg."
    required: true
  nginx-version:
    description: "source version, e.g. 1.31.1 (nginx) or 1.12.0 (angie)"
    required: true
  flavor:
    description: "nginx (default) | angie -- MUST match the ci-build.sh arg."
    required: false
    default: "nginx"

runs:
  using: composite
  steps:
    # Why hybrid:
    #   The builder02 runners are persistent incus containers today, so
    #   ~/.cache/ccache and .build/ survive between jobs on disk -- the fastest
    #   possible cache, with no upload/download at all. But that is a property
    #   of the CURRENT runner topology, not a guarantee: an ephemeral
    #   conversion is already designed (see the repo's CI notes), and hosted
    #   runners (codeql.yml uses ubuntu-latest) never had it.
    #
    #   actions/cache is therefore the FALLBACK, not the primary. On a warm
    #   persistent runner it costs one cheap key lookup; on an ephemeral one it
    #   is the only thing standing between you and a cold build every job.
    #   Deleting it "because the runners are persistent" is how this template
    #   silently degrades the day that stops being true.
    #
    # BEFORE YOU "FIX" A CACHE MISS ON A PR -- read this.
    #   GitHub scopes caches BY REF. A PR run writes to refs/pull/N/merge, an
    #   isolated scope; a branch run writes to refs/heads/<branch>. Neither can
    #   read the other's entries. Only caches on the DEFAULT branch are
    #   inherited by every other ref.
    #
    #   Consequences, both of which look like "the cache is broken" and are not:
    #     - The FIRST run of a new PR always misses. It has no scope to read
    #       from until main has populated one. This is correct and expected.
    #     - Comparing a PR run against a branch-dispatch run compares two
    #       different scopes and will show a phantom miss.
    #
    #   Verified on this repo: two runs with a byte-identical buildtree key
    #   missed each other purely because one was refs/pull/1/merge and the
    #   other refs/heads/ci/cache-layer. Re-running on the SAME ref hit, and
    #   the build step went 8s -> 0s. Nothing was wrong with the key.

    # ccache is keyed by CONTENT (CCACHE_COMPILERCHECK=content in ci-build.sh),
    # so a toolchain or flag change invalidates individual objects on its own.
    # The restore-keys ladder is safe here: a stale ccache can only ever cause a
    # miss, never a wrong object -- the opposite of the build-tree cache below.
    #
    # github.sha is deliberately in the primary key even though it can never hit
    # on the run that writes it: actions/cache only SAVES when the primary key
    # missed, so a stable primary key would freeze the cache at its first
    # contents and never fold in newly-compiled objects. A per-commit primary +
    # a restore-keys ladder is the documented way to get a rolling cache.
    - name: Restore ccache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/ccache
        key: ccache-${{ runner.os }}-${{ inputs.mode }}-${{ inputs.flavor }}-${{ inputs.nginx-version }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ inputs.mode }}-${{ inputs.flavor }}-${{ inputs.nginx-version }}-
          ccache-${{ runner.os }}-${{ inputs.mode }}-${{ inputs.flavor }}-

    # The upstream tarball never changes for a given version -- key on version
    # alone, no restore-keys ladder (a "close" tarball is the wrong tarball).
    - name: Cache source tarball
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: .build/${{ inputs.flavor }}-${{ inputs.nginx-version }}.tar.gz
        key: src-${{ inputs.flavor }}-${{ inputs.nginx-version }}

    # THE DANGEROUS ONE. The build tree holds compiled objects, and debug/asan
    # objects are NOT interchangeable -- restoring a debug objs/ into an asan
    # job yields a green sanitizer job that checks nothing.
    #
    # Two defences, deliberately redundant:
    #   1. `mode` is in the key AND in the tree path (.build/nginx-<ver>-<mode>).
    #   2. NO restore-keys ladder. A prefix match could hand this job a tree
    #      built from different flags; an exact-match-or-nothing key means the
    #      worst case is a cold build, never a wrong one.
    # If you add restore-keys here to "improve the hit rate", you have
    # reintroduced the bug. Don't.
    - name: Cache build tree (exact-match only -- see comment)
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: .build/${{ inputs.flavor }}-${{ inputs.nginx-version }}-${{ inputs.mode }}
        key: >-
          buildtree-${{ runner.os }}-${{ inputs.mode }}-${{ inputs.flavor }}-${{ inputs.nginx-version }}-${{ hashFiles('ci/tools/ci-build.sh', 'config', 'src/**') }}

    - name: Ensure ccache and mold are present
      shell: bash
      run: |
        set -euo pipefail
        # Present on the builder02 runners already; installed only on a hosted
        # runner (codeql.yml). Cheap to check, and it keeps the template
        # portable to a fresh runner image.
        need=()
        command -v ccache >/dev/null || need+=(ccache)
        command -v mold   >/dev/null || need+=(mold)
        if [ ${#need[@]} -gt 0 ]; then
          sudo apt-get update
          sudo apt-get install -y "${need[@]}"
        fi
        ccache --version | head -1
